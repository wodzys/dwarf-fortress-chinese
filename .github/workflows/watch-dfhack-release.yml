name: Watch DFHack releases

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest DFHack release
        id: fetch-dfhack-latest
        run: |
          tag=$(gh api repos/DFHack/dfhack/releases/latest --jq .tag_name)
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "Latest DFHack release: $tag"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Restore last-known DFHack tag
        id: restore-known-tag
        uses: actions/cache/restore@v4
        with:
          path: dfhack_tag.txt
          key: dfhack-tag-${{ steps.fetch-dfhack-latest.outputs.tag }}

      - name: Trigger dfzh release workflow
        if: steps.restore-known-tag.outputs.cache-hit != 'true'
        id: trigger-release
        run: |
          gh workflow run release.yml -R ${{ github.repository }}
          echo "Triggered release.yml for DFHack ${{ steps.fetch-dfhack-latest.outputs.tag }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Save DFHack tag for next run
        if: steps.restore-known-tag.outputs.cache-hit != 'true'
        id: save-known-tag
        uses: actions/cache/save@v4
        with:
          path: dfhack_tag.txt
          key: dfhack-tag-${{ steps.fetch-dfhack-latest.outputs.tag }}
