name: Build dfzh plugin (win64)

on:
  workflow_call:
    inputs:
      dfhack_tag:
        description: 'DFHack tag to build against (auto-detect if empty)'
        required: false
        type: string
      checkout_ref:
        description: 'Git ref to checkout plugin source (default: event ref)'
        required: false
        type: string
    outputs:
      built_tag:
        description: 'The DFHack tag that was actually built against'
        value: ${{ jobs.build-win64.outputs.built_tag }}

jobs:
  build-win64:
    name: Build win64
    runs-on: windows-2022
    outputs:
      built_tag: ${{ steps.dfhack-tag.outputs.tag }}
    steps:
      - name: Check out plugin source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}
          path: plugin

      - name: Install build dependencies
        run: |
          choco install sccache

      - name: Setup vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: plugin/3rdParty/vcpkg_installed
          key: vcpkg-win-${{ hashFiles('plugin/3rdParty/vcpkg.json') }}

      - name: Install vcpkg dependencies
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          vcpkg install `
            --x-manifest-root=${{ github.workspace }}/plugin/3rdParty `
            --x-install-root=${{ github.workspace }}/plugin/3rdParty/vcpkg_installed `
            --triplet x64-windows
        env:
          VCPKG_MAX_CONCURRENCY: 2

      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: plugin/3rdParty/vcpkg_installed
          key: vcpkg-win-${{ hashFiles('plugin/3rdParty/vcpkg.json') }}

      - name: Determine DFHack tag
        id: dfhack-tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.dfhack_tag }}"
          if (-not $tag) {
            $tag = gh api repos/DFHack/dfhack/releases/latest --jq ".tag_name"
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "tag=$tag"
          Write-Host "Using DFHack tag: $tag"

      - name: Clone DFHack
        uses: actions/checkout@v4
        with:
          repository: DFHack/dfhack
          ref: ${{ steps.dfhack-tag.outputs.tag }}
          submodules: true
          fetch-depth: 1
          path: dfhack

      - name: Copy plugin into DFHack external plugins tree
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/dfhack/plugins/external/dfzh"
          Copy-Item -Recurse -Path "${{ github.workspace }}/plugin/*" -Destination "${{ github.workspace }}/dfhack/plugins/external/dfzh/"
          Set-Content -Path "${{ github.workspace }}/dfhack/plugins/external/CMakeLists.txt" -Value "add_subdirectory(dfzh)"

      - name: Get sccache path
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "SCCACHE_DIR=$env:LOCALAPPDATA\Mozilla\sccache\cache"

      - name: Fetch sccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: win-msvc-dfzh-${{ steps.dfhack-tag.outputs.tag }}

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Configure DFHack
        working-directory: ${{ github.workspace }}/dfhack
        run: |
          cmake `
            -S . `
            -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX=output `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
            -DBUILD_LIBRARY:BOOL=ON `
            -DBUILD_PLUGINS:BOOL=ON `
            -DBUILD_SUPPORTED:BOOL=OFF `
            -DBUILD_DEV_PLUGINS:BOOL=OFF

      - name: Build plugin
        working-directory: ${{ github.workspace }}/dfhack
        env:
          SCCACHE_CACHE_SIZE: 500M
        run: ninja -C build dfzh

      - name: Report DFHack version
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Built against DFHack version: ${{ steps.dfhack-tag.outputs.tag }}"

      - name: Finalize sccache
        run: |
          sccache --show-stats
          sccache --zero-stats

      - name: Save sccache
        uses: actions/cache/save@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: win-msvc-dfzh-${{ steps.dfhack-tag.outputs.tag }}

      - name: Prep artifact
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/artifact"
          $plugin = Get-ChildItem -Recurse -Path "${{ github.workspace }}/dfhack/build" -Filter "dfzh.plug.dll" | Select-Object -First 1
          if (-not $plugin) {
            Write-Host "::error::dfzh.plug.dll not found in build tree"
            exit 1
          }
          $tag = "${{ steps.dfhack-tag.outputs.tag }}"
          Copy-Item -Path $plugin.FullName -Destination "${{ github.workspace }}/artifact/dfzh-${tag}.plug.dll"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dfzh-win64-${{ steps.dfhack-tag.outputs.tag }}
          path: ${{ github.workspace }}/artifact/
