base = "psychology::needs"

[[rulesets]]
[rulesets.rules]
"{main}" = "{main}"

[[rulesets]]
name = "main"
[rulesets.rules]
"Overall,{sex}{kind}{things}{tail}" = "总体上来看，{sex}{kind}{things}{tail}"
"{sex}{things}{tail}" = "{sex}{things}{tail}"

[[rulesets]]
