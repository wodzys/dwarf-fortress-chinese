"A Dwarven Outpost: You have arrived. After a journey from the Mountainhomes into the forbidding wilderness beyond, your harsh trek has finally ended. Your party of seven is to make an outpost for the glory of all of {@ph}." = "一座矮人前哨: 你们终于抵达了。历经从群山家园出发, 穿越险恶荒野的漫长旅程, 艰苦的跋涉至此告一段落。你们这支七人队伍, 将在此建立一座前哨, 为{@ph}全体子民赢得荣光。"
"There are almost no supplies left, but with stout labor comes sustenance. Whether by bolt, plow or hook, provide for your dwarves. You are expecting a supply caravan just before winter entombs you, but it is Spring now. Enough time to delve secure lodgings, ere the {::creatures::name::plural} get hungry." = "补给所剩无几, 但只要勤勉劳作, 便能获得温饱。无论使用弩矢、犁铧还是鱼钩, 务必保障矮人们的生计。你们预计在寒冬将你们封困之前, 会有一支补给商队抵达，而如今正值春季——尚有充足时间挖掘出安全的居所，赶在{::creatures::name::plural}饥肠辘辘之前。"
"A new chapter of dwarven history begins here at this place, {@ph}. Strike the earth!" = "矮人历史的新篇章在这里{@ph}开始书写. 开山掘地！"
"Last track: Dwarf Fortress - {@ph}" = "上一个曲目：矮人要塞 - {@ph}"
"Last interlude: {@ph}" = "上一段插曲：{@ph}"